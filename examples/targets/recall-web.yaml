name: recall-web
transport: abx
tags: [web, recall]
capabilities:
  web: true
  screenshot: true
  gui: true
abx:
  # Point at any web URL. Default is recall's marketing site; swap to
  # http://localhost:<port> after `recall webui start` to screenshot the
  # local dashboard, or set abx.mode=live to drive your real Chrome via
  # CDP (needs `~/Projects/agent-scripts/browser/scripts/chrome-debug`
  # once for the CDP port).
  url: https://recallmemory.dev/
