name: mac-local-um
transport: undermouse
tags: [local, mac, llm, agent]
capabilities:
  gui: true
  screenshot: true
  shell: true
# The undermouse transport drives the local `um` CLI (the headless face of
# UnderMouse). Click/type/hotkey kinds round-trip through `um act` and land
# in UnderMouse's safe action runtime — set `OPENAI_API_KEY` in the
# environment if you want the ask/summarize/rewrite kinds to call the model
# instead of falling back to the offline stub.
