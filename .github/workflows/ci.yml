name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: fmt
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt issues:"
            echo "$fmt_out"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.txt ./...
      - name: build
        run: go build ./...
