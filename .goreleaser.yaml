version: 2

project_name: vmlab

before:
  hooks:
    - go mod tidy

builds:
  - id: vmlab
    main: ./cmd/vmlab
    binary: vmlab
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/edihasaj/vmlab/internal/version.Version={{.Version}}
      - -X github.com/edihasaj/vmlab/internal/version.Commit={{.Commit}}
      - -X github.com/edihasaj/vmlab/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'

# Homebrew tap publishing. Auto-pushes Formula/vmlab.rb to
# edihasaj/homebrew-tap on every tag. Needs:
#   1. HOMEBREW_TAP_TOKEN secret on the vmlab repo (PAT with
#      contents:write on edihasaj/homebrew-tap), and
#   2. either vmlab going public OR end users exporting
#      HOMEBREW_GITHUB_API_TOKEN so brew can fetch the release tarball.
# Goreleaser skips this step silently when HOMEBREW_TAP_TOKEN is
# missing (skip_upload: auto), so unconfigured tag pushes still succeed.
brews:
  - name: vmlab
    repository:
      owner: edihasaj
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/edihasaj/vmlab"
    description: "Transport-agnostic orchestrator for cross-OS verify loops."
    license: "MIT"
    commit_author:
      name: goreleaser
      email: noreply@edihasaj.com
    install: |
      bin.install "vmlab"
    test: |
      system "#{bin}/vmlab", "--version"
    skip_upload: auto

release:
  github:
    owner: edihasaj
    name: vmlab
  draft: false
  prerelease: auto
