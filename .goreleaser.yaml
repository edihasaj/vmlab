version: 2

project_name: vmlab

before:
  hooks:
    - go mod tidy

builds:
  - id: vmlab
    main: ./cmd/vmlab
    binary: vmlab
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/edihasaj/vmlab/internal/version.Version={{.Version}}
      - -X github.com/edihasaj/vmlab/internal/version.Commit={{.Commit}}
      - -X github.com/edihasaj/vmlab/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'

# Homebrew tap publishing is configured but disabled until a HOMEBREW_TAP_TOKEN
# repo secret is set and the vmlab repo is public. Re-enable by removing the
# `disable:` line below.
homebrew_casks:
  - name: vmlab
    disable: 'true'
    repository:
      owner: edihasaj
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    homepage: https://github.com/edihasaj/vmlab
    description: One CLI for agents to install, set up, test, and verify software across any reachable target.

release:
  github:
    owner: edihasaj
    name: vmlab
  draft: false
  prerelease: auto
