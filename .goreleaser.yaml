version: 2

project_name: vmlab

before:
  hooks:
    - go mod tidy

builds:
  - id: vmlab
    main: ./cmd/vmlab
    binary: vmlab
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/edihasaj/vmlab/internal/version.Version={{.Version}}
      - -X github.com/edihasaj/vmlab/internal/version.Commit={{.Commit}}
      - -X github.com/edihasaj/vmlab/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'

# Homebrew tap publishing intentionally omitted until:
#  1. vmlab repo goes public (so brew can read the tarballs), and
#  2. a HOMEBREW_TAP_TOKEN secret is set in the vmlab repo (PAT with
#     `contents:write` on edihasaj/homebrew-tap).
# To re-enable: add a `brews:` (or `homebrew_casks:`) block pointing at
# edihasaj/homebrew-tap and re-tag.

release:
  github:
    owner: edihasaj
    name: vmlab
  draft: false
  prerelease: auto
