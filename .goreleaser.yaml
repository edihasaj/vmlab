version: 2

project_name: vmlab

before:
  hooks:
    - go mod tidy

builds:
  - id: vmlab
    main: ./cmd/vmlab
    binary: vmlab
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/edihasaj/vmlab/internal/version.Version={{.Version}}
      - -X github.com/edihasaj/vmlab/internal/version.Commit={{.Commit}}
      - -X github.com/edihasaj/vmlab/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'

brews:
  - name: vmlab
    # Skip when no tap token is provided (vmlab repo still private).
    skip_upload: '{{ if eq (index .Env "HOMEBREW_TAP_TOKEN" | default "") "" }}true{{ else }}false{{ end }}'
    repository:
      owner: edihasaj
      name: homebrew-tap
      token: '{{ index .Env "HOMEBREW_TAP_TOKEN" | default "" }}'
    homepage: https://github.com/edihasaj/vmlab
    description: One CLI for agents to install, set up, test, and verify software across any reachable target.
    license: MIT
    install: |
      bin.install "vmlab"
    test: |
      system "#{bin}/vmlab", "version"

release:
  github:
    owner: edihasaj
    name: vmlab
  draft: false
  prerelease: auto
